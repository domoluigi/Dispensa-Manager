name: Dispensa Manager
version: "2.0.2"
slug: dispensa_manager
description: Gestione dispensa con barcode scanner, scadenze, lista spesa e autenticazione utenti.
url: https://github.com/domoluigi/Dispensa-Manager
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto

ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: Flask API e frontend

ingress: true
ingress_port: 5000
panel_icon: mdi:fridge-outline
panel_title: Dispensa

map:
  - config:rw
  - data:rw

options:
  jwt_secret_key: ""
  telegram_token: ""
  telegram_chat_id: ""
  giorni_alert_scadenza: 3
  cloudflare_url: ""

schema:
  jwt_secret_key: str?
  telegram_token: str?
  telegram_chat_id: str?
  giorni_alert_scadenza: int?
  cloudflare_url: str?

# Tutte le opzioni sono facoltative: se non compilate vengono
# gestite dal pannello Admin dell'app (sezione Impostazioni).
# jwt_secret_key: se vuoto viene generato automaticamente dal DB.
