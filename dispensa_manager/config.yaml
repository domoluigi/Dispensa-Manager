name: "Dispensa Manager"
description: "Backend API per la gestione della dispensa con barcode scanner, PWA iPhone e notifiche Telegram"
version: "1.3.2"
slug: dispensa_manager
init: false
arch:
  - aarch64
  - amd64
  - armv7
homeassistant_api: true
hassio_api: true
hassio_role: default
auth_api: true
ingress: true
ingress_port: 5000
panel_icon: mdi:fridge-outline
panel_title: Dispensa
options:
  telegram_token: ""
  telegram_chat_id: ""
  giorni_alert_scadenza: 3
  soglia_scorte_minime: 1
  cloudflare_token: ""
  pwa_url: ""
schema:
  telegram_token: str
  telegram_chat_id: str
  giorni_alert_scadenza: int
  soglia_scorte_minime: int
  cloudflare_token: str
  pwa_url: str
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: "API REST Dispensa"
map:
  - config:rw
