name: "Dispensa Manager"
version: "1.5.1"
slug: "dispensa_manager"
description: "Gestione dispensa con scanner barcode, OCR scadenze e notifiche Telegram"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ingress: true
ingress_port: 5000
panel_icon: mdi:fridge-outline
panel_title: Dispensa
ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: "Flask API + frontend"
map:
  - config:rw
  - data:rw
host_network: false
options:
  telegram_token: ""
  telegram_chat_id: ""
  giorni_alert_scadenza: 3
  soglia_scorte_minime: 1
schema:
  telegram_token: str
  telegram_chat_id: str
  giorni_alert_scadenza: int
  soglia_scorte_minime: int

