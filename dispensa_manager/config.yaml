name: Dispensa Manager
version: "2.0.0"
slug: dispensa_manager
description: Gestione dispensa con barcode scanner, scadenze, lista spesa e autenticazione utenti.
url: https://github.com/domoluigi/Dispensa-Manager
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto

ports:
  5000/tcp: 5000
ports_description:
  5000/tcp: Flask API e frontend

ingress: true
ingress_port: 5000
panel_icon: mdi:fridge-outline
panel_title: Dispensa

map:
  - config:rw
  - data:rw

options:
  jwt_secret_key: ""

schema:
  jwt_secret_key: str

# Nota: le impostazioni operative (Telegram, Cloudflare, alert)
# si configurano dal pannello Admin dell'app dopo il primo login.
