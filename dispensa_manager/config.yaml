name: "Dispensa Manager"
version: "1.4.2"
slug: "dispensa_manager"
description: "Gestione dispensa con scanner barcode, OCR scadenze e notifiche Telegram"
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ingress: true
ingress_port: 5000
webui: "http://[HOST]:[PORT:5000]/"
map:
  - config:rw
  - data:rw
host_network: false
options:
  telegram_token: ""
  telegram_chat_id: ""
  giorni_alert_scadenza: 3
  soglia_scorte_minime: 1
  cloudflare_token: ""
  pwa_url: ""
schema:
  telegram_token: str
  telegram_chat_id: str
  giorni_alert_scadenza: int
  soglia_scorte_minime: int
  cloudflare_token: str
  pwa_url: str
